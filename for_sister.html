<!DOCTYPE html>
<html>

<head>
    <title>For didi </title>

    <style>
        body {
            background-color: #fff8dc;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 40px;
        }

        h1 {
            color: #ff6f61;
        }

        p {
            font-size: 18px;
        }

        button {
            margin-top: 20px;
            background-color: #ff6f61;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            transition: 0.2s;
        }

        button:active {
            transform: scale(0.95);
        }

        #message, #extra {
            display: none;
            margin-top: 20px;
        }

        #extra {
            color: #555;
            font-size: 16px;
        }
    </style>
</head>

<body>

    <h1>assalamualikum rahi didi </h1>
    <p>i created a little project to tell that..</p>

    <button onclick="showMessage()">Click me</button>

    <p id="message"></p>
    <p id="extra"></p>

    <script>
        function showMessage() {
            let msg = document.getElementById("message");
            let extra = document.getElementById("extra");

            msg.style.display = "block";
            msg.innerText = "THANK YOU FOR RECOMMENDING ME TO EXPLORE THINGS, I LIKE IT..";

            setTimeout(() => {
                extra.style.display = "block";
                extra.innerText = "but its a bit annoying ";
            }, 2800);
        }
    </script>

</body>

</html>
